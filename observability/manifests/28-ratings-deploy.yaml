# Phase 9b — ratings workload in ambient namespace (no sidecar).
# Upstream: https://github.com/istio/istio/tree/master/samples/bookinfo/platform/kube
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookinfo-ratings
  namespace: ossm-playground-ambient
---
apiVersion: v1
kind: Service
metadata:
  name: ratings
  namespace: ossm-playground-ambient
  labels:
    app: ratings
    service: ratings
spec:
  ports:
    - port: 9080
      name: http
  selector:
    app: ratings
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratings-v1
  namespace: ossm-playground-ambient
  labels:
    app: ratings
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ratings
      version: v1
  template:
    metadata:
      labels:
        app: ratings
        version: v1
    spec:
      serviceAccountName: bookinfo-ratings
      containers:
        - name: ratings
          image: docker.io/istio/examples-bookinfo-ratings-v1:1.20.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9080
