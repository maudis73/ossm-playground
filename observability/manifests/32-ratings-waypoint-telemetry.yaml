# Phase 9c — Prometheus metrics, OTLP tracing, and access logs on ratings waypoint.
# Mesh-wide Telemetry in maurizio-istio-system covers sidecars only; waypoints need targetRefs.
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: telemetry-ratings-waypoint
  namespace: ossm-playground-ambient
spec:
  targetRefs:
    - kind: Gateway
      name: ratings-waypoint
      group: gateway.networking.k8s.io
  metrics:
    - providers:
        - name: prometheus
  tracing:
    - providers:
        - name: otel
      randomSamplingPercentage: 100
  accessLogging:
    - providers:
        - name: envoy
