# Phase 7 — Kiali graph (Thanos) + traces (Tempo native API on :3200).
apiVersion: kiali.io/v1alpha1
kind: Kiali
metadata:
  name: kiali-user-workload-monitoring
  namespace: maurizio-istio-system
spec:
  deployment:
    cluster_wide_access: true
    discovery_selectors:
      default:
        - matchExpressions:
            - key: istio-discovery
              operator: In
              values:
                - enabled
  external_services:
    prometheus:
      auth:
        type: bearer
        use_kiali_token: true
      thanos_proxy:
        enabled: true
      url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
    grafana:
      enabled: false
    tracing:
      enabled: true
      provider: tempo
      use_grpc: false
      internal_url: http://tempo-simplest-query-frontend.tempostack.svc.cluster.local:3200
      health_check_url: http://tempo-simplest-query-frontend.tempostack.svc.cluster.local:3200/status/services
      external_url: https://tempo-simplest-query-frontend-tempostack.apps.ocp4.masales.cloud
      namespace_selector: true
      query_timeout: 60
      tempo_config:
        url_format: jaeger
