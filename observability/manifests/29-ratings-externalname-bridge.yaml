# Phase 9b — DNS bridge so reviews-v2 keeps calling http://ratings:9080 in ossm-playground-apps.
# Apply only after deleting the original ratings Service/Deployment in ossm-playground-apps.
apiVersion: v1
kind: Service
metadata:
  name: ratings
  namespace: ossm-playground-apps
  labels:
    app: ratings
    service: ratings
spec:
  type: ExternalName
  externalName: ratings.ossm-playground-ambient.svc.cluster.local
  ports:
    - port: 9080
      name: http
