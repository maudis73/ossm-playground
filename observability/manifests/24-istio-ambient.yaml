# Phase 9a — ambient profile on Istio/default; preserves Phase 7 tracing settings.
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
spec:
  namespace: maurizio-istio-system
  version: v1.27-latest
  values:
    pilot:
      trustedZtunnelNamespace: ztunnel
    profile: ambient
    meshConfig:
      defaultConfig:
        proxyMetadata:
          ISTIO_META_ENABLE_HBONE: "true"
      discoverySelectors:
        - matchLabels:
            istio-discovery: enabled
      enableTracing: true
      extensionProviders:
        - name: otel
          opentelemetry:
            service: otel-collector.maurizio-istio-system.svc.cluster.local
            port: 4317
