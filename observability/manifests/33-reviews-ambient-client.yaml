# Phase 9d — reviews calls ratings through the ambient waypoint (L7 traces/logs).
#
# A sidecar on reviews bypasses the destination waypoint. Run reviews as an ambient
# pod (no sidecar) while productpage/details keep sidecars in the same namespace.
#
# Do NOT label ossm-playground-apps with istio.io/dataplane-mode=ambient — that
# drops sidecars from productpage/details on rollout. Ambient mode is pod-scoped here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviews-v2
  namespace: ossm-playground-apps
  labels:
    app: reviews
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reviews
      version: v2
  template:
    metadata:
      labels:
        app: reviews
        version: v2
        istio.io/dataplane-mode: ambient
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: bookinfo-reviews
      containers:
        - name: reviews
          image: docker.io/istio/examples-bookinfo-reviews-v2:1.20.2
          imagePullPolicy: IfNotPresent
          env:
            - name: LOG_DIR
              value: /tmp/logs
          ports:
            - containerPort: 9080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: wlp-output
              mountPath: /opt/ibm/wlp/output
      volumes:
        - name: wlp-output
          emptyDir: {}
        - name: tmp
          emptyDir: {}
