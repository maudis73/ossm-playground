# Required on OpenShift (user workload monitoring): without this, Prometheus
# does not scrape istio-proxy metrics and Kiali traffic graph stays empty.
# Same pattern as travel-agency / ossm-playground sidecar labs.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-proxies-monitor
  namespace: ossm-playground-apps
spec:
  selector:
    matchExpressions:
      - key: istio-prometheus-ignore
        operator: DoesNotExist
  podMetricsEndpoints:
    - path: /stats/prometheus
      interval: 30s
      relabelings:
        - action: keep
          sourceLabels: [__meta_kubernetes_pod_container_name]
          regex: istio-proxy
        - action: keep
          sourceLabels: [__meta_kubernetes_pod_annotationpresent_prometheus_io_scrape]
        - action: replace
          regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
          replacement: '[$2]:$1'
          sourceLabels:
            - __meta_kubernetes_pod_annotation_prometheus_io_port
            - __meta_kubernetes_pod_ip
          targetLabel: __address__
        - action: replace
          regex: (\d+);((([0-9]+?)(\.|$)){4})
          replacement: $2:$1
          sourceLabels:
            - __meta_kubernetes_pod_annotation_prometheus_io_port
            - __meta_kubernetes_pod_ip
          targetLabel: __address__
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_label_app_kubernetes_io_name
            - __meta_kubernetes_pod_label_app
          separator: ;
          targetLabel: app
          regex: "(.+);.*|.*;(.+)"
          replacement: "${1}${2}"
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_label_app_kubernetes_io_version
            - __meta_kubernetes_pod_label_version
          separator: ;
          targetLabel: version
          regex: "(.+);.*|.*;(.+)"
          replacement: "${1}${2}"
        - action: replace
          sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - action: replace
          replacement: ossm-demo
          targetLabel: mesh_id
