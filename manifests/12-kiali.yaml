# Minimal Kiali — Prometheus metrics / traffic graph only (no tracing).
apiVersion: kiali.io/v1alpha1
kind: Kiali
metadata:
  name: kiali-user-workload-monitoring
  namespace: maurizio-istio-system
spec:
  deployment:
    cluster_wide_access: true
    discovery_selectors:
      default:
        - matchExpressions:
            - key: istio-discovery
              operator: In
              values:
                - enabled
  external_services:
    prometheus:
      auth:
        type: bearer
        use_kiali_token: true
      thanos_proxy:
        enabled: true
      url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
    grafana:
      enabled: false
    tracing:
      enabled: false
