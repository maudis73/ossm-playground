# Minimal TempoStack — RH distributed tracing backend.
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoStack
metadata:
  name: workshop
  namespace: tempostack
spec:
  storage:
    secret:
      name: minio-traces-secret
      type: s3
  storageSize: 1Gi
  resources:
    total:
      limits:
        memory: 2Gi
        cpu: 2000m
  template:
    queryFrontend:
      jaegerQuery:
        enabled: true
        ingress:
          type: route
          route:
            termination: edge
